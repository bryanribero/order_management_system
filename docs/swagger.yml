components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: true
      properties:
        email:
          type: string
          format: email
          description: Email único del usuario.
          example: usuario@example.com
        password:
          type: string
          minLength: 8
          maxLength: 16
          pattern: '^\S+$'
          description: Contraseña del usuario. Debe ser texto, no puede contener espacios y debe incluir al menos una letra mayúscula.
          example: '123G5678'
        role:
          type: string
          enum:
            - admin
            - owner
          readOnly: true
          description: Este campo es ignorado durante el registro; el servidor asigna owner por defecto.
          example: owner
    LoginRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: true
      properties:
        email:
          type: string
          format: email
          description: Email del usuario registrado.
          example: usuario@example.com
        password:
          type: string
          minLength: 8
          maxLength: 16
          pattern: '^\S+$'
          description: Password del usuario. Debe ser texto, no puede contener espacios y debe incluir al menos una letra mayúscula.
          example: passwordTest
    UpdateUserRequest:
      type: object
      additionalProperties: true
      minProperties: 1
      properties:
        email:
          type: string
          format: email
          description: Nuevo email del usuario.
          example: usuario-actualizado@example.com
        password:
          type: string
          minLength: 8
          maxLength: 16
          pattern: '^\S+$'
          description: Nueva contraseña del usuario. Debe ser texto, no puede contener espacios y debe incluir al menos una letra mayúscula.
          example: NewPass123
    DeleteUserRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          description: Contraseña actual del usuario autenticado.
          example: 1234567A
    User:
      type: object
      required:
        - id_user
        - email
        - role
      properties:
        id_user:
          type: integer
          format: int32
          example: 1
        email:
          type: string
          format: email
          example: usuario@example.com
        role:
          type: string
          enum:
            - admin
            - owner
          example: owner
    Courier:
      type: object
      required:
        - id_courier
        - name
      properties:
        id_courier:
          type: integer
          format: int32
          example: 1
        name:
          type: string
          example: Repartidor 1
        phone:
          type: string
          nullable: true
          example: '1234567890'
        note:
          type: string
          nullable: true
