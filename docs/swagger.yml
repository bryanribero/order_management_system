openapi: 3.0.3
info:
  title: Order Management System API
  version: 1.0.0
  description: API para gestionar pedidos, productos, clientes, repartidores y autenticación.
servers:
  - url: http://localhost:3000
    description: Servidor local

tags:
  - name: Auth
    description: Endpoints de autenticación y registro de usuarios.
  - name: Products
    description: Endpoints para gestionar productos del usuario autenticado.

paths:
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Registrar un nuevo usuario
      description: Crea un usuario nuevo con email y password. El password debe ser texto, no puede contener espacios, debe tener entre 8 y 16 caracteres e incluir al menos una letra mayúscula. El rol se asigna por defecto como owner aunque se envíe otro rol en el cuerpo de la petición.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              validUser:
                summary: Usuario válido
                value:
                  email: usuario@example.com
                  password: '123G5678'
      responses:
        '201':
          description: Usuario creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSuccessResponse'
              examples:
                created:
                  summary: Registro exitoso
                  value:
                    success: true
                    message: Usuario creado correctamente!
                    user:
                      id_user: 1
                      email: usuario@example.com
                      role: owner
        '400':
          description: Error de validación del cuerpo de la petición o JSON inválido.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                emptyBody:
                  summary: Body vacío
                  value:
                    success: false
                    errors:
                      - field: email
                        message: El email es obligatorio
                      - field: password
                        message: La contraseña es obligatoria
                invalidEmail:
                  summary: Email inválido
                  value:
                    success: false
                    errors:
                      - field: email
                        message: El email ingresado no es válido
                invalidPasswordType:
                  summary: Password no es texto
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe ser texto
                passwordWithSpaces:
                  summary: Password con espacios
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña no puede contener espacios
                shortPassword:
                  summary: Password demasiado corto
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe tener al menos 8 caracteres
                longPassword:
                  summary: Password demasiado largo
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe contener hasta 16 caracteres
                passwordWithoutUppercase:
                  summary: Password sin mayúscula
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe contener al menos una letra mayúscula
                malformedJson:
                  summary: JSON inválido
                  value:
                    success: false
                    errors:
                      - message: JSON inválido o mal formado
        '409':
          description: El email ya se encuentra registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                duplicatedEmail:
                  summary: Email duplicado
                  value:
                    success: false
                    errors:
                      - message: El email ya está en uso
        '429':
          description: Se superó el límite de intentos de registro.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                rateLimit:
                  summary: Límite de registros superado
                  value:
                    success: false
                    errors:
                      - message: Demasiados intentos de registro. Intenta nuevamente más tarde.
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                internalError:
                  summary: Error interno
                  value:
                    success: false
                    errors:
                      - message: Error interno del servidor
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Iniciar sesión
      description: Autentica un usuario registrado con email y password. Si las credenciales son válidas, devuelve un access token con duración de 1 hora y un refresh token con duración de 7 días.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              validCredentials:
                summary: Credenciales válidas
                value:
                  email: usuario@example.com
                  password: passwordTest
      responses:
        '200':
          description: Inicio de sesión exitoso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
              examples:
                loggedIn:
                  summary: Login exitoso
                  value:
                    success: true
                    message: Inicio de sesión exitoso
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Error de validación del cuerpo de la petición o JSON inválido.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                emptyBody:
                  summary: Body vacío
                  value:
                    success: false
                    errors:
                      - field: email
                        message: El email es obligatorio
                      - field: password
                        message: La contraseña es obligatoria
                invalidEmail:
                  summary: Email inválido
                  value:
                    success: false
                    errors:
                      - field: email
                        message: El email ingresado no es válido
                passwordWithSpaces:
                  summary: Password con espacios
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña no puede contener espacios
                shortPassword:
                  summary: Password demasiado corto
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe tener al menos 8 caracteres
                longPassword:
                  summary: Password demasiado largo
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe contener hasta 16 caracteres
                passwordWithoutUppercase:
                  summary: Password sin mayúscula
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe contener al menos una letra mayúscula
                malformedJson:
                  summary: JSON inválido
                  value:
                    success: false
                    errors:
                      - message: JSON inválido o mal formado
        '401':
          description: El email no existe o el password no coincide.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                invalidCredentials:
                  summary: Credenciales inválidas
                  value:
                    success: false
                    errors:
                      - message: Credenciales inválidas
        '429':
          description: Se superó el límite de intentos de login.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                rateLimit:
                  summary: Límite de login superado
                  value:
                    success: false
                    errors:
                      - message: Demasiados intentos de login. Intenta nuevamente más tarde.
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                internalError:
                  summary: Error interno
                  value:
                    success: false
                    errors:
                      - message: Error interno del servidor
  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: Cerrar sesión
      description: Revoca los refresh tokens activos del usuario autenticado. Requiere un access token válido en el encabezado Authorization con el esquema Bearer.
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sesión cerrada correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccessResponse'
              examples:
                loggedOut:
                  summary: Logout exitoso
                  value:
                    success: true
                    message: Sesión cerrada correctamente
        '401':
          description: No se envió un access token válido o el encabezado Authorization es inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                missingToken:
                  summary: Token requerido
                  value:
                    success: false
                    errors:
                      - message: Token requerido
                invalidHeader:
                  summary: Encabezado inválido
                  value:
                    success: false
                    errors:
                      - message: Encabezado Authorization inválido
                invalidToken:
                  summary: Token inválido
                  value:
                    success: false
                    errors:
                      - message: Token inválido
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                internalError:
                  summary: Error interno
                  value:
                    success: false
                    errors:
                      - message: Error interno del servidor
  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: Renovar tokens
      description: Genera un nuevo access token y un nuevo refresh token usando un refresh token válido en el encabezado Authorization con el esquema Bearer. Al renovar, el refresh token anterior queda revocado.
      operationId: refreshTokens
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tokens renovados correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshSuccessResponse'
              examples:
                refreshed:
                  summary: Refresh exitoso
                  value:
                    success: true
                    message: Tokens renovados correctamente
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          description: No se envió un refresh token válido, el encabezado Authorization es inválido, el token expiró o el token fue revocado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                missingToken:
                  summary: Token requerido
                  value:
                    success: false
                    errors:
                      - message: Token requerido
                invalidHeader:
                  summary: Encabezado inválido
                  value:
                    success: false
                    errors:
                      - message: Encabezado Authorization inválido
                invalidToken:
                  summary: Token inválido
                  value:
                    success: false
                    errors:
                      - message: Token inválido
                expiredToken:
                  summary: Token expirado
                  value:
                    success: false
                    errors:
                      - message: Token expirado
                revokedToken:
                  summary: Token revocado
                  value:
                    success: false
                    errors:
                      - message: Token revocado
        '429':
          description: Se superó el límite de intentos de renovación de tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                rateLimit:
                  summary: Límite de refresh superado
                  value:
                    success: false
                    errors:
                      - message: Demasiados intentos de Refresh. Intenta nuevamente más tarde.
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                internalError:
                  summary: Error interno
                  value:
                    success: false
                    errors:
                      - message: Error interno del servidor
  /api/products:
    get:
      tags:
        - Products
      summary: Obtener productos
      description: Obtiene los productos asociados al usuario autenticado. Permite paginar la respuesta con los query params page y limit. El límite máximo permitido es 50.
      operationId: getUserProducts
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Número de página a consultar. Si no se envía, el servicio utiliza la página 1.
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          required: false
          description: Cantidad de productos por página. Si no se envía, el servicio utiliza 20. El máximo permitido es 50.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
            example: 20
      responses:
        '200':
          description: Productos obtenidos correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserProductsSuccessResponse'
              examples:
                withProducts:
                  summary: Productos encontrados
                  value:
                    success: true
                    products:
                      - id_product: 1
                        sku: SKU-001
                        name: Café molido
                        price: '125.50'
                        stock: 12
                      - id_product: 2
                        sku: null
                        name: Caja de té
                        price: '80.00'
                        stock: 5
                empty:
                  summary: Sin productos
                  value:
                    success: true
                    products: []
        '400':
          description: Error de validación de los query params.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalidPage:
                  summary: Página inválida
                  value:
                    success: false
                    errors:
                      - field: page
                        message: La página debe ser un número entero
                invalidPageMin:
                  summary: Página menor a uno
                  value:
                    success: false
                    errors:
                      - field: page
                        message: La página debe ser mayor o igual a 1
                invalidLimit:
                  summary: Límite inválido
                  value:
                    success: false
                    errors:
                      - field: limit
                        message: El límite debe ser un número entero
                invalidLimitRange:
                  summary: Límite fuera de rango
                  value:
                    success: false
                    errors:
                      - field: limit
                        message: El límite debe estar entre 1 y 50
        '401':
          description: No se envió un access token válido o el encabezado Authorization es inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                missingToken:
                  summary: Token requerido
                  value:
                    success: false
                    errors:
                      - message: Token requerido
                invalidHeader:
                  summary: Encabezado inválido
                  value:
                    success: false
                    errors:
                      - message: Encabezado Authorization inválido
                invalidToken:
                  summary: Token inválido
                  value:
                    success: false
                    errors:
                      - message: Token inválido
        '429':
          description: Se superó el límite de solicitudes para obtener productos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                rateLimit:
                  summary: Límite de obtención de productos superado
                  value:
                    success: false
                    errors:
                      - message: Demasiadas solicitudes para obtener productos. Intenta nuevamente más tarde.
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                internalError:
                  summary: Error interno
                  value:
                    success: false
                    errors:
                      - message: Error interno del servidor
    post:
      tags:
        - Products
      summary: Crear producto
      description: Crea un producto asociado al usuario autenticado. El SKU es opcional, pero si se envía no puede repetirse para el mismo usuario.
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            examples:
              withSku:
                summary: Producto con SKU
                value:
                  sku: SKU-001
                  name: Café molido
                  price: '125.50'
                  stock: 12
              withoutSku:
                summary: Producto sin SKU
                value:
                  name: Caja de té
                  price: '80.00'
                  stock: 5
      responses:
        '201':
          description: Producto creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateProductSuccessResponse'
              examples:
                created:
                  summary: Creación exitosa
                  value:
                    success: true
                    message: Producto creado correctamente
                    product:
                      id_product: 1
                      sku: SKU-001
                      name: Café molido
                      price: '125.50'
                      stock: 12
        '400':
          description: Error de validación del cuerpo de la petición o JSON inválido.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                emptyBody:
                  summary: Body vacío
                  value:
                    success: false
                    errors:
                      - field: name
                        message: El nombre del producto es obligatorio
                      - field: price
                        message: El precio del producto es obligatorio
                      - field: stock
                        message: El stock del producto es obligatorio
                invalidPrice:
                  summary: Precio inválido
                  value:
                    success: false
                    errors:
                      - field: price
                        message: El precio del producto debe ser decimal
                invalidPriceMin:
                  summary: Precio menor o igual a cero
                  value:
                    success: false
                    errors:
                      - field: price
                        message: El precio del producto debe ser mayor a 0
                invalidStock:
                  summary: Stock inválido
                  value:
                    success: false
                    errors:
                      - field: stock
                        message: El stock del producto debe ser entero
                invalidStockMin:
                  summary: Stock negativo
                  value:
                    success: false
                    errors:
                      - field: stock
                        message: El stock del producto no puede ser negativo
                malformedJson:
                  summary: JSON inválido
                  value:
                    success: false
                    errors:
                      - message: JSON inválido o mal formado
        '401':
          description: No se envió un access token válido o el encabezado Authorization es inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                missingToken:
                  summary: Token requerido
                  value:
                    success: false
                    errors:
                      - message: Token requerido
                invalidHeader:
                  summary: Encabezado inválido
                  value:
                    success: false
                    errors:
                      - message: Encabezado Authorization inválido
                invalidToken:
                  summary: Token inválido
                  value:
                    success: false
                    errors:
                      - message: Token inválido
        '409':
          description: El SKU ya existe para el usuario autenticado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                duplicatedSku:
                  summary: SKU duplicado
                  value:
                    success: false
                    errors:
                      - message: El SKU ya está en uso para este usuario
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                internalError:
                  summary: Error interno
                  value:
                    success: false
                    errors:
                      - message: Error interno del servidor
    patch:
      tags:
        - Products
      summary: Actualizar productos por filtro
      description: Actualiza los productos del usuario autenticado cuyo nombre coincida parcialmente con el query param word. Devuelve los productos actualizados.
      operationId: updateProduct
      security:
        - bearerAuth: []
      parameters:
        - name: word
          in: query
          required: true
          description: Texto utilizado para filtrar productos por nombre. Es obligatorio y no puede estar vacío.
          schema:
            type: string
            example: Cafe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
            examples:
              updateFields:
                summary: Campos a actualizar
                value:
                  name: Cafe en grano
                  price: '150.00'
                  stock: 8
      responses:
        '200':
          description: Producto actualizado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateProductSuccessResponse'
              examples:
                updated:
                  summary: Actualización exitosa
                  value:
                    success: true
                    message: Producto actualizado correctamente
                    product:
                      - id_product: 1
                        id_user: 1
                        sku: SKU-001
                        name: Cafe en grano
                        price: '150.00'
                        stock: 8
        '400':
          description: Error de validación del query param word o JSON inválido.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                missingWord:
                  summary: Word obligatorio
                  value:
                    success: false
                    errors:
                      - field: word
                        message: El campo "word" es obligatorio y debe contener un valor para filtrar los productos.
                malformedJson:
                  summary: JSON inválido
                  value:
                    success: false
                    errors:
                      - message: JSON inválido o mal formado
        '401':
          description: No se envió un access token válido o el encabezado Authorization es inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                missingToken:
                  summary: Token requerido
                  value:
                    success: false
                    errors:
                      - message: Token requerido
                invalidHeader:
                  summary: Encabezado inválido
                  value:
                    success: false
                    errors:
                      - message: Encabezado Authorization inválido
                invalidToken:
                  summary: Token inválido
                  value:
                    success: false
                    errors:
                      - message: Token inválido
        '404':
          description: No se encontró ningún producto del usuario autenticado que coincida con el filtro.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                notFound:
                  summary: Producto no encontrado
                  value:
                    success: false
                    errors:
                      - message: Producto no encontrado
        '429':
          description: Se superó el límite de solicitudes para obtener o actualizar productos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                rateLimit:
                  summary: Límite de productos superado
                  value:
                    success: false
                    errors:
                      - message: Demasiadas solicitudes para obtener productos. Intenta nuevamente más tarde.
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                internalError:
                  summary: Error interno
                  value:
                    success: false
                    errors:
                      - message: Error interno del servidor
    delete:
      tags:
        - Products
      summary: Eliminar productos por filtro
      description: Elimina los productos del usuario autenticado cuyo nombre coincida parcialmente con el query param word. Devuelve la cantidad de productos eliminados.
      operationId: deleteProduct
      security:
        - bearerAuth: []
      parameters:
        - name: word
          in: query
          required: true
          description: Texto utilizado para filtrar productos por nombre. Es obligatorio y no puede estar vacío.
          schema:
            type: string
            example: Cafe
      responses:
        '200':
          description: Productos eliminados correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteProductSuccessResponse'
              examples:
                deleted:
                  summary: Eliminación exitosa
                  value:
                    success: true
                    message: Productos eliminados correctamente
                    deletedCount: 1
        '400':
          description: Error de validación del query param word.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missingWord:
                  summary: Word obligatorio
                  value:
                    success: false
                    errors:
                      - field: word
                        message: El campo "word" es obligatorio y debe contener un valor para filtrar los productos.
        '401':
          description: No se envió un access token válido o el encabezado Authorization es inválido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                missingToken:
                  summary: Token requerido
                  value:
                    success: false
                    errors:
                      - message: Token requerido
                invalidHeader:
                  summary: Encabezado inválido
                  value:
                    success: false
                    errors:
                      - message: Encabezado Authorization inválido
                invalidToken:
                  summary: Token inválido
                  value:
                    success: false
                    errors:
                      - message: Token inválido
        '404':
          description: No se encontró ningún producto del usuario autenticado que coincida con el filtro.
          content:
            application/json:
              schema:
