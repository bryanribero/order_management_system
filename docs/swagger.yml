components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: true
      properties:
        email:
          type: string
          format: email
          description: Email único del usuario.
          example: usuario@example.com
        password:
          type: string
          minLength: 8
          maxLength: 16
          pattern: '^\S+$'
          description: Contraseña del usuario. Debe ser texto, no puede contener espacios y debe incluir al menos una letra mayúscula.
          example: '123G5678'
        role:
          type: string
          enum:
            - admin
            - owner
          readOnly: true
          description: Este campo es ignorado durante el registro; el servidor asigna owner por defecto.
          example: owner
    LoginRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: true
      properties:
        email:
          type: string
          format: email
          description: Email del usuario registrado.
          example: usuario@example.com
        password:
          type: string
          minLength: 8
          maxLength: 16
          pattern: '^\S+$'
          description: Password del usuario. Debe ser texto, no puede contener espacios y debe incluir al menos una letra mayúscula.
          example: passwordTest
    User:
      type: object
      required:
        - id_user
        - email
        - role
      properties:
        id_user:
          type: integer
          format: int32
          example: 1
        email:
          type: string
          format: email
          example: usuario@example.com
        role:
          type: string
          enum:
            - admin
            - owner
          example: owner
    Product:
      type: object
      required:
        - id_product
        - name
        - price
        - stock
      properties:
        id_product:
          type: integer
          format: int32
          example: 1
        sku:
          type: string
          nullable: true
          example: SKU-001
        name:
          type: string
          example: Café molido
        price:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          example: '125.50'
        stock:
          type: integer
          minimum: 0
          example: 12
    ProductReadById:
      type: object
      required:
        - id_product
        - id_user
        - name
        - price
        - stock
      properties:
        id_product:
          type: integer
          format: int32
          example: 1
        id_user:
          type: integer
          format: int32
          example: 1
        sku:
          type: string
          nullable: true
          example: null
        name:
          type: string
          example: Producto de prueba
        price:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          example: '100.00'
        stock:
          type: integer
          minimum: 0
          example: 20
    CreateProductRequest:
      type: object
      required:
        - name
        - price
        - stock
      additionalProperties: true
      properties:
        sku:
          type: string
          nullable: true
          description: Código opcional del producto. No puede repetirse para el mismo usuario.
          example: SKU-001
        name:
          type: string
          minLength: 1
          maxLength: 50
          description: Nombre del producto.
          example: Café molido
        price:
          oneOf:
            - type: string
              pattern: '^\d+(\.\d+)?$'
            - type: number
              format: float
          description: Precio decimal del producto. Debe ser mayor a 0.
          example: '125.50'
        stock:
          type: integer
          minimum: 0
          description: Stock inicial del producto. No puede ser negativo.
          example: 12
    UpdateProductRequest:
      type: object
      additionalProperties: true
      properties:
        sku:
          type: string
          nullable: true
          description: Nuevo código opcional del producto.
          example: SKU-001
        name:
          type: string
          description: Nuevo nombre del producto.
          example: Cafe en grano
        price:
          oneOf:
            - type: string
              pattern: '^\d+(\.\d+)?$'
            - type: number
              format: float
          description: Nuevo precio decimal del producto.
          example: '150.00'
        stock:
          type: integer
          minimum: 0
          description: Nuevo stock del producto.
          example: 8
    RegisterSuccessResponse:
      type: object
      required:
        - success
        - message
        - user
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Usuario creado correctamente!
        user:
          $ref: '#/components/schemas/User'
    LoginSuccessResponse:
      type: object
      required:
        - success
        - message
        - accessToken
        - refreshToken
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Inicio de sesión exitoso
        accessToken:
          type: string
          description: JWT de acceso válido por 1 hora.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: JWT de refresco válido por 7 días.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    CreateProductSuccessResponse:
      type: object
      required:
        - success
        - message
        - product
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Producto creado correctamente
        product:
          $ref: '#/components/schemas/Product'
    GetUserProductsSuccessResponse:
      type: object
      required:
        - success
        - products
      properties:
        success:
          type: boolean
          example: true
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    GetUserProductByIdSuccessResponse:
      type: object
      required:
        - success
        - product
      properties:
        success:
          type: boolean
          example: true
        product:
          $ref: '#/components/schemas/ProductReadById'
    UpdateProductSuccessResponse:
      type: object
      required:
        - success
        - message
        - product
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Producto actualizado correctamente
        product:
          type: array
          items:
            $ref: '#/components/schemas/ProductReadById'
    DeleteProductSuccessResponse:
      type: object
      required:
        - success
        - message
        - deletedCount
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Productos eliminados correctamente
        deletedCount:
          type: integer
          example: 1
    RefreshSuccessResponse:
      type: object
      required:
        - success
        - message
        - accessToken
        - refreshToken
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Tokens renovados correctamente
        accessToken:
          type: string
          description: Nuevo JWT de acceso válido por 1 hora.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: Nuevo JWT de refresco válido por 7 días.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    LogoutSuccessResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Sesión cerrada correctamente
    ValidationErrorResponse:
      type: object
      required:
        - success
        - errors
      properties:
        success:
          type: boolean
          example: false
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    GenericErrorResponse:
      type: object
      required:
        - success
        - errors
      properties:
        success:
          type: boolean
          example: false
        errors:
          type: array
          items:
            $ref: '#/components/schemas/MessageError'
    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: El email es obligatorio
    MessageError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Error interno del servidor
