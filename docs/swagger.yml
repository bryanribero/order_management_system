openapi: 3.0.3
info:
  title: Order Management System API
  version: 1.0.0
  description: API para gestionar pedidos, productos, clientes, repartidores y autenticacion.
servers:
  - url: http://localhost:3000
    description: Servidor local

tags:
  - name: Auth
    description: Endpoints de autenticacion y registro de usuarios.

paths:
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: Registrar un nuevo usuario
      description: Crea un usuario nuevo con email y password. El password debe ser texto, no puede contener espacios, debe tener entre 8 y 16 caracteres e incluir al menos una letra mayúscula. El rol se asigna por defecto como owner aunque se envie otro rol en el cuerpo de la peticion.
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              validUser:
                summary: Usuario valido
                value:
                  email: usuario@example.com
                  password: '123G5678'
      responses:
        '201':
          description: Usuario creado correctamente.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterSuccessResponse'
              examples:
                created:
                  summary: Registro exitoso
                  value:
                    success: true
                    message: Usuario creado correctamente!
                    user:
                      id_user: 1
                      email: usuario@example.com
                      role: owner
        '400':
          description: Error de validacion del cuerpo de la peticion o JSON invalido.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                emptyBody:
                  summary: Body vacio
                  value:
                    success: false
                    errors:
                      - field: email
                        message: El email es obligatorio
                      - field: password
                        message: La contraseña es obligatoria
                invalidEmail:
                  summary: Email invalido
                  value:
                    success: false
                    errors:
                      - field: email
                        message: El email ingresado no es válido
                invalidPasswordType:
                  summary: Password no es texto
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe ser texto
                passwordWithSpaces:
                  summary: Password con espacios
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña no puede contener espacios
                shortPassword:
                  summary: Password demasiado corto
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe tener al menos 8 caracteres
                longPassword:
                  summary: Password demasiado largo
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe de contener hasta 16 caracteres
                passwordWithoutUppercase:
                  summary: Password sin mayuscula
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe contener al menos una letra mayúscula
                malformedJson:
                  summary: JSON invalido
                  value:
                    success: false
                    errors:
                      - message: JSON inválido o mal formado
        '409':
          description: El email ya se encuentra registrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                duplicatedEmail:
                  summary: Email duplicado
                  value:
                    success: false
                    errors:
                      - message: El email ya está en uso
        '429':
          description: Se supero el limite de intentos de registro.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                rateLimit:
                  summary: Limite de registros superado
                  value:
                    success: false
                    errors:
                      - message: Demasiados intentos de registro. Intenta nuevamente más tarde.
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                internalError:
                  summary: Error interno
                  value:
                    success: false
                    errors:
                      - message: Error interno del servidor
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: Iniciar sesion
      description: Autentica un usuario registrado con email y password. Si las credenciales son validas, devuelve un access token con duracion de 1 hora y un refresh token con duracion de 7 dias.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              validCredentials:
                summary: Credenciales validas
                value:
                  email: usuario@example.com
                  password: passwordTest
      responses:
        '200':
          description: Inicio de sesion exitoso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
              examples:
                loggedIn:
                  summary: Login exitoso
                  value:
                    success: true
                    message: Inicio de sesión exitoso
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Error de validacion del cuerpo de la peticion o JSON invalido.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationErrorResponse'
                  - $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                emptyBody:
                  summary: Body vacio
                  value:
                    success: false
                    errors:
                      - field: email
                        message: El email es obligatorio
                      - field: password
                        message: La contraseña es obligatoria
                invalidEmail:
                  summary: Email invalido
                  value:
                    success: false
                    errors:
                      - field: email
                        message: El email ingresado no es válido
                passwordWithSpaces:
                  summary: Password con espacios
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña no puede contener espacios
                shortPassword:
                  summary: Password demasiado corto
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe tener al menos 8 caracteres
                longPassword:
                  summary: Password demasiado largo
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe de contener hasta 16 caracteres
                passwordWithoutUppercase:
                  summary: Password sin mayuscula
                  value:
                    success: false
                    errors:
                      - field: password
                        message: La contraseña debe contener al menos una letra mayúscula
                malformedJson:
                  summary: JSON invalido
                  value:
                    success: false
                    errors:
                      - message: JSON inválido o mal formado
        '401':
          description: El email no existe o el password no coincide.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                invalidCredentials:
                  summary: Credenciales invalidas
                  value:
                    success: false
                    errors:
                      - message: Credenciales inválidas
        '429':
          description: Se supero el limite de intentos de login.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                rateLimit:
                  summary: Limite de login superado
                  value:
                    success: false
                    errors:
                      - message: Demasiados intentos de login. Intenta nuevamente más tarde.
        '500':
          description: Error interno del servidor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
              examples:
                internalError:
                  summary: Error interno
                  value:
                    success: false
                    errors:
                      - message: Error interno del servidor

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: true
      properties:
        email:
          type: string
          format: email
          description: Email unico del usuario.
          example: usuario@example.com
        password:
          type: string
          minLength: 8
          maxLength: 16
          pattern: '^\S+$'
          description: Contraseña del usuario. Debe ser texto, no puede contener espacios y debe incluir al menos una letra mayúscula.
          example: '123G5678'
        role:
          type: string
          enum:
            - admin
            - owner
          readOnly: true
          description: Este campo es ignorado durante el registro; el servidor asigna owner por defecto.
          example: owner
    LoginRequest:
      type: object
      required:
        - email
        - password
      additionalProperties: true
      properties:
        email:
          type: string
          format: email
          description: Email del usuario registrado.
          example: usuario@example.com
        password:
          type: string
          minLength: 8
          maxLength: 16
          pattern: '^\S+$'
          description: Password del usuario. Debe ser texto, no puede contener espacios y debe incluir al menos una letra mayúscula.
          example: passwordTest
    User:
      type: object
      required:
        - id_user
        - email
        - role
      properties:
        id_user:
          type: integer
          format: int32
          example: 1
        email:
          type: string
          format: email
          example: usuario@example.com
        role:
          type: string
          enum:
            - admin
            - owner
          example: owner
    RegisterSuccessResponse:
      type: object
      required:
        - success
        - message
        - user
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Usuario creado correctamente!
        user:
          $ref: '#/components/schemas/User'
    LoginSuccessResponse:
      type: object
      required:
        - success
        - message
        - accessToken
        - refreshToken
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Inicio de sesión exitoso
        accessToken:
          type: string
          description: JWT de acceso valido por 1 hora.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: JWT de refresco valido por 7 dias.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
    ValidationErrorResponse:
      type: object
      required:
        - success
        - errors
      properties:
        success:
          type: boolean
          example: false
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    GenericErrorResponse:
      type: object
      required:
        - success
        - errors
      properties:
        success:
          type: boolean
          example: false
        errors:
          type: array
          items:
            $ref: '#/components/schemas/MessageError'
    FieldError:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: El email es obligatorio
    MessageError:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: Error interno del servidor
